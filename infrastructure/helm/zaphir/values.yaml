global:
  imageRegistry: ghcr.io/zaphir
  environment: production

backend:
  replicaCount: 3
  image:
    repository: zaphir-backend
    tag: latest
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  env:
    DATABASE_URL:
      valueFrom:
        secretKeyRef:
          name: zaphir-secrets
          key: database-url
    REDIS_URL:
      valueFrom:
        secretKeyRef:
          name: zaphir-secrets
          key: redis-url
    JWT_SECRET:
      valueFrom:
        secretKeyRef:
          name: zaphir-secrets
          key: jwt-secret

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: api.zaphir.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts: [api.zaphir.com]
      secretName: zaphir-tls
