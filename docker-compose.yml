version: '3.9'

# ════════════════════════════════════════════════════════════
# VARIABLES PARTAGÉES
# ════════════════════════════════════════════════════════════
x-common-env: &common-env
  NODE_ENV: ${NODE_ENV:-development}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
  DATABASE_URL: ${DATABASE_URL:-postgresql://zaphir:zaphir_dev_password@postgres:5432/zaphir?schema=public}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}

# ════════════════════════════════════════════════════════════
# SERVICES
# ════════════════════════════════════════════════════════════
services:

  # ─── PostgreSQL ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zaphir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zaphir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zaphir_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-zaphir}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - zaphir-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.zaphir.service: "database"
      com.zaphir.tier: "data"

  # ─── Redis (cache + rate limiting) ─────────────
  redis:
    image: redis:7.4-alpine
    container_name: zaphir-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --tcp-keepalive 60
      --timeout 300
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - zaphir-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      com.zaphir.service: "redis"
      com.zaphir.tier: "cache"

  # ─── Redis Insight (UI de monitoring Redis) ────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: zaphir-redis-insight
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - zaphir-net
    depends_on:
      - redis
    labels:
      com.zaphir.service: "redis-insight"
      com.zaphir.tier: "monitoring"

  # ─── Redis Exporter (Prometheus) ──────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: zaphir-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - zaphir-net
    depends_on:
      - redis
    labels:
      com.zaphir.service: "redis-exporter"
      com.zaphir.tier: "monitoring"

  # ─── PostgreSQL Exporter (Prometheus) ─────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: zaphir-postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://zaphir:zaphir_dev_password@postgres:5432/zaphir?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - zaphir-net
    depends_on:
      - postgres
    labels:
      com.zaphir.service: "postgres-exporter"
      com.zaphir.tier: "monitoring"

  # ─── Backend API ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zaphir-backend
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 5000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "5000:5000"
    volumes:
      - backend-logs:/app/logs
    networks:
      - zaphir-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      com.zaphir.service: "backend"
      com.zaphir.tier: "api"

  # ─── Frontend ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:5000/ws}
    container_name: zaphir-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - zaphir-net
    labels:
      com.zaphir.service: "frontend"
      com.zaphir.tier: "web"

  # ─── Monitoring : Prometheus ──────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: zaphir-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - zaphir-net
    depends_on:
      - backend

  # ─── Monitoring : Grafana ─────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: zaphir-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-zaphir2024}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - zaphir-net
    depends_on:
      - prometheus

# ════════════════════════════════════════════════════════════
# VOLUMES
# ════════════════════════════════════════════════════════════
volumes:
  postgres-data:
    name: zaphir-postgres-data
  redis-data:
    name: zaphir-redis-data
  backend-logs:
    name: zaphir-backend-logs
  prometheus-data:
    name: zaphir-prometheus-data
  grafana-data:
    name: zaphir-grafana-data

# ════════════════════════════════════════════════════════════
# RÉSEAUX
# ════════════════════════════════════════════════════════════
networks:
  zaphir-net:
    name: zaphir-net
    driver: bridge
