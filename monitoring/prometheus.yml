global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'zaphir-prod'
    monitor: 'zaphir-monitor'

rule_files:
  - "alerts.yml"

scrape_configs:
  # ─── Backend API ──────────────────────────────
  - job_name: 'zaphir-backend'
    metrics_path: /api/metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:5000']
        labels:
          service: 'backend'
          tier: 'api'

  # ─── Prometheus self-monitoring ────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Redis Exporter ───────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          tier: 'cache'

  # ─── PostgreSQL Exporter ──────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          tier: 'data'
