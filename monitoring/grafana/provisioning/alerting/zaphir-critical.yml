apiVersion: 1

groups:
  - orgId: 1
    name: 'zaphir-production-critical'
    folder: 'Zaphir'
    interval: 1m
    rules:
      - uid: 'backend-down'
        title: 'Backend Zaphir DOWN'
        condition: 'C'
        data:
          - refId: 'A'
            datasourceUid: 'prometheus'
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'up{job="zaphir-backend"}'
              instant: true
              refId: 'A'
          - refId: 'C'
            datasourceUid: '__expr__'
            relativeTimeRange: { from: 0, to: 0 }
            model:
              type: 'threshold'
              expression: 'A'
              conditions:
                - evaluator: { type: 'lt', params: [1] }
              refId: 'C'
        noDataState: 'NoData'
        execErrState: 'Alerting'
        for: '1m'
        annotations:
          summary: '🚨 CRITIQUE: Backend Zaphir inaccessible'
          description: 'Le backend ne répond pas depuis 1 minute. Impact utilisateur probable.'
        labels:
          severity: 'critical'
          team: 'platform'

      - uid: 'high-error-rate'
        title: 'Taux d\'erreur élevé'
        condition: 'C'
        data:
          - refId: 'A'
            datasourceUid: 'prometheus'
            relativeTimeRange: { from: 300, to: 0 }
            model:
              expr: 'sum(rate(http_requests_total{status_code=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) * 100'
              instant: true
              refId: 'A'
          - refId: 'C'
            datasourceUid: '__expr__'
            relativeTimeRange: { from: 0, to: 0 }
            model:
              type: 'threshold'
              expression: 'A'
              conditions:
                - evaluator: { type: 'gt', params: [5] }
              refId: 'C'
        for: '2m'
        annotations:
          summary: '⚠️  Taux d\'erreur 5xx > 5%'
          description: 'Plus de 5% des requêtes échouent'
        labels:
          severity: 'critical'

      - uid: 'audit-chain-broken'
        title: 'Chaîne d\'audit compromise'
        condition: 'C'
        data:
          - refId: 'A'
            datasourceUid: 'prometheus'
            relativeTimeRange: { from: 600, to: 0 }
            model:
              expr: 'zaphir_audit_chain_valid'
              instant: true
              refId: 'A'
          - refId: 'C'
            datasourceUid: '__expr__'
            relativeTimeRange: { from: 0, to: 0 }
            model:
              type: 'threshold'
              expression: 'A'
              conditions:
                - evaluator: { type: 'lt', params: [1] }
              refId: 'C'
        for: '0m'
        annotations:
          summary: '🔒 CHAÎNE D\'AUDIT COMPROMISE'
          description: 'Intégrité des logs d\'audit non garantie. Investigation immédiate requise.'
        labels:
          severity: 'critical'
          compliance: 'soc2'

      - uid: 'low-cache-rate'
        title: 'Cache hit rate faible'
        condition: 'C'
        data:
          - refId: 'A'
            datasourceUid: 'prometheus'
            relativeTimeRange: { from: 600, to: 0 }
            model:
              expr: 'sum(rate(zaphir_cache_operations_total{result="hit"}[10m])) / sum(rate(zaphir_cache_operations_total{result=~"hit|miss"}[10m])) * 100'
              instant: true
              refId: 'A'
          - refId: 'C'
            datasourceUid: '__expr__'
            relativeTimeRange: { from: 0, to: 0 }
            model:
              type: 'threshold'
              expression: 'A'
              conditions:
                - evaluator: { type: 'lt', params: [70] }
              refId: 'C'
        for: '10m'
        annotations:
          summary: 'Cache Redis sous-utilisé'
          description: 'Hit rate < 70% depuis 10 minutes'
        labels:
          severity: 'warning'
