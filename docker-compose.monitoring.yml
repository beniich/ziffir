services:
  # ─── Prometheus ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: zaphir-prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks: [zaphir-net]

  # ─── Alertmanager ─────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: zaphir-alertmanager
    restart: unless-stopped
    ports: ["9093:9093"]
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [zaphir-net]

  # ─── Grafana ─────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: zaphir-grafana
    restart: unless-stopped
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-zaphir2024}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana/data
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/custom-styles.css:/etc/grafana/custom-styles.css:ro
    networks: [zaphir-net]
    depends_on: [prometheus]

volumes:
  prometheus-data:
  grafana-data:

networks:
  zaphir-net:
    external: true
